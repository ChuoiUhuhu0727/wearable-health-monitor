; PlatformIO Project Configuration File cho Seeed Studio XIAO ESP32-S3
; Dự án: Thiết bị phân tích tín hiệu đòn đánh Aikido & Nhịp tim hồi phục

[platformio]
src_dir = .
default_envs = baseline

[env:seeed_xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<firmware_main/>
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_qspi
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 1
monitor_rts = 1
lib_deps =
    adafruit/Adafruit MPU6050 @ ^2.2.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    mobizt/ESP Mail Client @ ^3.4.22

; -----------------------------------------------------------------------
; Environment đo baseline — chạy TRƯỚC khi redesign FreeRTOS
; Teammate: chọn env này trong PlatformIO, Upload, mở Serial Monitor 115200
; -----------------------------------------------------------------------
[env:baseline]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<firmware_baseline_evaluate/>
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_qspi
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 1
monitor_rts = 1
lib_deps =
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2

; -----------------------------------------------------------------------
; FreeRTOS architecture v1 — Week 2 milestone
; Không có WiFi / Email. BLE thay thế toàn bộ.
; Teammate: chọn env "freertos_v1", Upload, dùng nRF Connect để verify BLE
; -----------------------------------------------------------------------
[env:freertos_v1]
platform = espressif32@6.4.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<firmware_main/>
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_qspi
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 1
monitor_rts = 1
lib_deps =
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    h2zero/NimBLE-Arduino @ ^1.4.2

; -----------------------------------------------------------------------
; BLE branch — forked from firmware_main/ on 2026-07-10. Option 4 (Jetson
; WiFi AP + UDP) is parked, not abandoned; this goes back to BLE, less
; polished but previously proven stable. See firmware_ble/main.cpp header
; and [[project-option4-jetson-plan]] (Claude memory) for the full reasoning.
; -----------------------------------------------------------------------
[env:ble]
platform = espressif32@6.4.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<firmware_ble/>
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_qspi
; Default scheme sized LittleFS for a 4MB chip (1.5MB spiffs) even though
; this board has 8MB — measured on-device 2026-07-17, confirmed too small
; for raw waveform capture (~1.6MB/participant). See partitions_ble_8mb.csv.
board_build.partitions = partitions_ble_8mb.csv
board_upload.flash_size = 8MB
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 1
monitor_rts = 1
lib_deps =
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2
    h2zero/NimBLE-Arduino @ ^1.4.2

; -----------------------------------------------------------------------
; Waveform capture demo — standalone, NOT the FreeRTOS pipeline. The real
; dataset never logs raw PPG/accel (only reduced features), so there was
; no way to plot an actual waveform for the professor. Samples both
; sensors at 100Hz for ~20s and prints CSV over Serial — see
; firmware_capture/main.cpp and capture_waveform.py (repo root).
; -----------------------------------------------------------------------
[env:waveform_capture]
platform = espressif32@6.4.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<firmware_capture/>
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_qspi
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 1
monitor_rts = 1
lib_deps =
    sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library @ ^1.1.2

; -----------------------------------------------------------------------
; Buzzer isolation test — no FreeRTOS/mutex/sensors, just raw GPIO + tone()
; Use this to check whether the buzzer bug is hardware or in the main firmware
; -----------------------------------------------------------------------
[env:buzzer_test]
platform = espressif32@6.4.0
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_src_filter = -<*> +<firmware_buzzer_test/>
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_qspi
build_flags =
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
monitor_dtr = 1
monitor_rts = 1